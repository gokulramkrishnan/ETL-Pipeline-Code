name: 'dv_snowflake_project'
version: '1.0.0'
config-version: 2

profile: 'snowflake_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# ── datavault4dbt global variables ──────────────────────────────────────────
vars:
  # Hash algorithm: MD5 or SHA-256
  datavault4dbt:
    hash:                  'MD5'
    # Technical column names
    load_datetime:         'LOAD_DATE'
    record_source:         'RECORD_SOURCE'
    # Snowflake-specific
    beginning_of_all_times: '1970-01-01 00:00:00.000'
    end_of_all_times:        '8888-12-31 23:59:59.999'
    # Ghost record defaults
    ghost_pk:              '0000000000000000000000000000000000000000'
    ghost_date:            '1970-01-01 00:00:00.000'
    ghost_rsrc:            'SYSTEM'
    is_incremental:        true

models:
  dv_snowflake_project:
    staging:
      +schema:       'STAGING'
      +materialized: view
      +tags:         ['staging']

    raw_vault:
      +schema:       'RAW_VAULT'
      +materialized: incremental
      +unique_key:   'dummy'          # overridden per model
      +tags:         ['raw_vault']
      hubs:
        +tags: ['hub']
      links:
        +tags: ['link']
      satellites:
        +tags: ['satellite']

    business_vault:
      +schema:       'BUSINESS_VAULT'
      +materialized: table
      +tags:         ['business_vault']
